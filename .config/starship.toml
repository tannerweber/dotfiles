# Disable the blank line at the start of the prompt
add_newline = false

[fill]
#symbol = 'ÔöÇ'
symbol = ' '
style = 'bold white'
disabled = false

# You can also replace your username with a neat symbol like ´äá  or disable this
# and use the os module below
[username]
show_always = true
style_user = "fg:#FFFFFF bg:#9A348E"
style_root = "fg:#FFFFFF bg:#9A348E"
format = '[$user ]($style)'
disabled = false

[hostname]
ssh_only = false
ssh_symbol = '´é¼ '
trim_at = ''
style = "fg:#FFFFFF bg:#9A348E"
disabled = false
format = '[$ssh_symbol](fg:#FFFF00 bg:#9A348E)[´ç║ $hostname ]($style)'

# An alternative to the username module which displays a symbol that
# represents the current operating system
[os]
style = "fg:#FFFFFF bg:#9A348E"
disabled = false

[os.symbols]
Arch = "´îâ "
Debian = "¯»à "
NixOS = "´îô "
Kali = "´îğ "
Linux = "¯£Æ "
Macos = "´îé "
Mint = "¾░ú¡ "
Ubuntu = "¯¢▓ "
Windows = "¯£Å "

[directory]
style = "fg:#FFFFFF bg:#DA627D"
read_only_style = "fg:#FFFFFF bg:#DA627D"
format = "[ $path ]($style)[$read_only]($read_only_style)"
truncation_length = 3
truncation_symbol = "ÔÇĞ/"

# Here is how you can shorten some long paths by text replacement
# similar to mapped_locations in Oh My Posh:
[directory.substitutions]
# "Documents" = "¾░êÖ "
# "Downloads" = "´ÇÖ "
# "Music" = "´Çü "
# "Pictures" = "´Ç¥ "
# Keep in mind that the order matters. For example:
# "Important Documents" = " ¾░êÖ´ä¬ "
# will not be replaced, because "Documents" was already substituted before.
# So either put "Important Documents" before "Documents" or use the substituted version:
# "Important ¾░êÖ " = " ¾░êÖ´ä¬ "

